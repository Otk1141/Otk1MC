    // ========== SKIN FUNCTIONS (used in Leaderboard) ==========
    let leaderboardSkinViewer = null;
    async function fetchUUID(username) {
      const res = await fetch(`https://api.mojang.com/users/profiles/minecraft/${username}`);
      if (!res.ok) throw new Error('User not found');
      const data = await res.json();
      return data.id;
    }
    async function fetchSkinUrls(uuid) {
      const res = await fetch(`https://sessionserver.mojang.com/session/minecraft/profile/${uuid}?unsigned=false`);
      const json = await res.json();
      const prop = json.properties.find(p => p.name === 'textures');
      if (!prop) return {};
      const decoded = JSON.parse(atob(prop.value));
      return { skinUrl: decoded.textures.SKIN?.url || null, capeUrl: decoded.textures.CAPE?.url || null };
    }

      `;
      (async () => {
        try {

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[currentLang][key]) el.innerText = translations[currentLang][key];
      });
      renderPage(activePage);
    }

    // initialize navigation
    document.querySelectorAll(".nav-item").forEach(item => {
      item.addEventListener("click", () => {
        document.querySelectorAll(".nav-item").forEach(nav => nav.classList.remove("active"));
        item.classList.add("active");
        renderPage(item.dataset.page);
      });
    });
    document.querySelector(".nav-item[data-page='home']").classList.add("active");
    applyTranslations();
    renderPage("home");
  })();
</script>
</body>
</html>
